# ==============================================================================
# HOMEPAGE SETTINGS CONFIGURATION (SETTINGS.YAML)
# ==============================================================================
# Configures title, theme, and grid layout columns for Homepage.
# Integrates active Google search bar focusing on landing.
# ==============================================================================

title: Homeserver
theme: dark
color: slate
showStats: true

# Active search bar targeting Google
search:
  provider: google
  focus: true
  showText: true

# Grid layout mapping the exact services categories
layout:
  Media Orchestration:
    style: grid
    columns: 4
  Personal Storage:
    style: grid
    columns: 3
  Utilities & Security:
    style: grid
    columns: 3
