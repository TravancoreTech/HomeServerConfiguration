# ==============================================================================
# UTILITY STACK DOCKER COMPOSE CONFIGURATION (DOCKER-COMPOSE_6.YML)
# ==============================================================================
# Consolidates background utilities, security tools, and productivity suites.
# The Redis service is bridged globally to allow other stacks (Nextcloud) to 
# cache data here, saving database/daemon runtime memory overhead.
# ==============================================================================

services:
  vaultwarden:
    container_name: utility_vaultwarden
    image: vaultwarden/server:latest
    restart: always
    environment:
      - TZ=${TZ:-Etc/UTC}
      - SIGNUPS_ALLOWED=true         # Set to false after account registration
      - WEBSOCKET_ENABLED=true
    ports:
      - "8086:80"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/vaultwarden:/data

  stirling-pdf:
    container_name: utility_stirling_pdf
    profiles: ["on-demand"]
    image: stirlingtools/stirling-pdf:latest
    restart: no
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - INSTALL_BOOK_AND_ADVANCED_HTML_OPS=false
    ports:
      - "8083:8080"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/stirling-pdf/trainingData:/usr/share/tessdata
      - ${SYSTEM_DATA_DIR:-../appdata}/stirling-pdf/extraConfigs:/configs

  it-tools:
    container_name: utility_it_tools
    profiles: ["on-demand"]
    image: corentinth/it-tools:latest
    restart: no
    ports:
      - "8084:80"

  uptime-kuma:
    container_name: utility_uptime_kuma
    profiles: ["on-demand"]
    image: louislam/uptime-kuma:1
    restart: no
    ports:
      - "3001:3001"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/uptime-kuma:/app/data
    networks:
      - default
      - homeserver_network

  syncthing:
    container_name: utility_syncthing
    profiles: ["on-demand"]
    image: lscr.io/linuxserver/syncthing:latest
    restart: no
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/syncthing:/config
      - /mnt/hdd:/mnt/hdd
      - /mnt/hdd6t:/mnt/hdd6t

  pairdrop:
    container_name: utility_pairdrop
    profiles: ["on-demand"]
    image: lscr.io/linuxserver/pairdrop:latest
    restart: no
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "3010:3000"

  paperless-redis:
    container_name: utility_paperless_redis
    image: docker.io/library/redis:7
    restart: always
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/paperless/redis:/data
    networks:
      - default
      - homeserver_network  # Shared network layout to expose Redis cache to Nextcloud

  paperless-web:
    container_name: utility_paperless_web
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: always
    depends_on:
      - paperless-redis
    ports:
      - "8010:8000"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/paperless/data:/usr/src/paperless/data
      - ${SYSTEM_DATA_DIR:-../appdata}/paperless/media:/usr/src/paperless/media
      - ${SYSTEM_DATA_DIR:-../appdata}/paperless/export:/usr/src/paperless/export
      - ${SYSTEM_DATA_DIR:-../appdata}/paperless/consume:/usr/src/paperless/consume
    environment:
      - PAPERLESS_REDIS=redis://utility_paperless_redis:6379
      - PAPERLESS_DBENGINE=sqlite
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY:-change_this_secret_key_123}
      - PAPERLESS_TIME_ZONE=${TZ:-Etc/UTC}
      - PAPERLESS_OCR_LANGUAGES=eng
    networks:
      - default
      - homeserver_network

  radicale:
    container_name: utility_radicale
    image: tomsquest/docker-radicale:latest
    restart: always
    ports:
      - "5232:5232"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/radicale:/data
    environment:
      - TZ=${TZ:-Etc/UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

  baikal:
    container_name: utility_baikal
    image: ckulka/baikal:nginx
    restart: always
    ports:
      - "8088:80"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/baikal/config:/var/www/baikal/config
      - ${SYSTEM_DATA_DIR:-../appdata}/baikal/Specific:/var/www/baikal/Specific
    environment:
      - TZ=${TZ:-Etc/UTC}

  cronicle:
    container_name: utility_cronicle
    image: soulteary/cronicle:latest
    restart: always
    ports:
      - "3012:3012"
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/cronicle/data:/opt/cronicle/data:rw
      - ${SYSTEM_DATA_DIR:-../appdata}/cronicle/logs:/opt/cronicle/logs:rw
      - ${SYSTEM_DATA_DIR:-../appdata}/cronicle/plugins:/opt/cronicle/plugins:rw
      - /mnt:/mnt
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - homeserver_network

  ofelia:
    container_name: utility_ofelia
    image: mcuadros/ofelia:latest
    restart: always
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
      - homeserver_network

networks:
  homeserver_network:
    external: true

