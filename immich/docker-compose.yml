# ==============================================================================
# IMMICH PHOTOS STACK DOCKER COMPOSE CONFIGURATION (DOCKER-COMPOSE_3.YML)
# ==============================================================================
# Immich is a high-performance self-hosted photo and video backup solution.
# This stack is refactored to support hardware-accelerated transcoding.
# ==============================================================================

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    extends:
      file: immich/hwaccel.transcoding.yml
      service: intel-gpu
    volumes:
      - ${UPLOAD_LOCATION:-../data/photos}:/data
      - ${PHOTO_BACKUP_LOCATION:-../data/photos}:/mnt/PhotoBackup:ro  # Read-only photo backup mount (set PHOTO_BACKUP_LOCATION in .env)
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    networks:
      - default
      - homeserver_network
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - immich-model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_immich_db_password}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION:-../appdata/immich/postgres}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  immich-model-cache:

networks:
  homeserver_network:
    external: true
