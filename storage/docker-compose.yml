# ==============================================================================
# STORAGE STACK DOCKER COMPOSE CONFIGURATION (DOCKER-COMPOSE_5.YML)
# ==============================================================================
# FileBrowser is a lightweight web file manager to navigate directories.
# Mounted to display local media files and provides template mounts for legacy NAS.
# ==============================================================================

services:
  filebrowser:
    container_name: storage_filebrowser
    image: filebrowser/filebrowser:latest
    restart: always
    user: "${PUID}:${PGID}"
    ports:
      - "8082:80"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/filebrowser/filebrowser.db:/database.db
      - ${MEDIA_DIR:-../data}:/srv/local  # Local media files library
      # ------------------------------------------------------------------------
      # LEGACY NAS MOUNTS (UNCOMMENT TO USE)
      # ------------------------------------------------------------------------
      # - legacy-nas-smb:/srv/nas-smb
      # - legacy-nas-nfs:/srv/nas-nfs

