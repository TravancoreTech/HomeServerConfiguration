# ==============================================================================
# DASHBOARD DOCKER COMPOSE CONFIGURATION (DOCKER-COMPOSE.YML)
# ==============================================================================
# This stack serves as the landing portal for the home server.
# Homepage is bound straight to port 80 to act as the root landing page.
#
# Services included:
#   1. Heimdall - Visual application launcher portal (port 8081)
#   2. Homepage - Modern, metric-capable server dashboard (port 80)
# ==============================================================================

services:
  heimdall:
    container_name: dashboard_heimdall
    image: lscr.io/linuxserver/heimdall:latest
    restart: always
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/heimdall:/config

  homepage:
    container_name: dashboard_homepage
    image: ghcr.io/benphelps/homepage:latest
    restart: always
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - HOMEPAGE_VAR_SERVER_IP=${HOMEPAGE_VAR_SERVER_IP:-}
      - HOMEPAGE_VAR_QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD:-}
      - HOMEPAGE_VAR_IMMICH_API_KEY=${IMMICH_API_KEY:-}
      - HOMEPAGE_VAR_PAPERLESS_USERNAME=${PAPERLESS_USERNAME:-}
      - HOMEPAGE_VAR_PAPERLESS_PASSWORD=${PAPERLESS_PASSWORD:-}
    ports:
      - "80:3000"  # Re-routed root IP (port 80) straight to Homepage
    volumes:
      - ${SYSTEM_DATA_DIR:-../appdata}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro # Attached to read container/API metrics
      - /:/srv/local:ro # Mount host root for disk space monitoring
    networks:
      - default
      - homeserver_network

  homarr:
    container_name: dashboard_homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: always
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
    ports:
      - "7575:7575"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${SYSTEM_DATA_DIR:-../appdata}/homarr:/appdata
    networks:
      - default
      - homeserver_network

networks:
  homeserver_network:
    external: true
